services:
  postgres:
    image: postgres:16-alpine
    container_name: sms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sms}
      POSTGRES_USER: ${POSTGRES_USER:-sms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sms_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sms_user} -d ${POSTGRES_DB:-sms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sms_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: sms_server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run deps:wait --workspace server && npm run prisma:generate --workspace server && npm run prisma:db:push --workspace server && npm run prisma:seed --workspace server && npm run dev --workspace server"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health/ready > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
    container_name: sms_client
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_PROXY_TARGET: http://server:4000
    ports:
      - "5173:5173"
    depends_on:
      server:
        condition: service_healthy
    command: sh -c "npm run dev --workspace client -- --host"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
